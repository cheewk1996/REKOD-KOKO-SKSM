<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- IMPORTANT for iPhone full screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PORKO-SKSM</title>
</head>
<body>
<h1>My School Web App</h1>
<p id="output">Loading...</p>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxI90Zj8HbO7GQKkSFMpB3Zf2087zx9_C778OQfjmwv-gexYgpICb_62n0VpnV46qFi/exec";
window.onload = function () {
  fetch(API_URL)
    .then(res => res.text())
    .then(data => {
      document.getElementById("output").innerText = data;
    });
};
</script>
</body>
</html>
