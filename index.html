<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- IMPORTANT for iPhone full screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PORKO-SKSM</title>
</head>
<body>
<h1>My School Web App</h1>
<p id="output">Loading...</p>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyL_lwsqNqOOb6X5huYfTUWvuzTiLDjOP0xn2K5gldEP5fDRxAm3gMgafRnVA4tUkVd/exec";
function handleResponse(data) {
  document.getElementById("output").innerText =
    data.message || "No message";
}
function loadData() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=handleResponse";
  script.onerror = function () {
    document.getElementById("output").innerText =
      "Failed to load API";
  };
  document.body.appendChild(script);
}
window.onload = loadData;
</script>
</body>
</html>
